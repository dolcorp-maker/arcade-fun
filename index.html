<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCADE HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-green: #00ff88;
      --neon-pink: #ff006e;
      --neon-blue: #00cfff;
      --neon-yellow: #ffe600;
      --bg: #05050f;
      --card-bg: #0d0d1a;
      --border: rgba(0,255,136,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* Grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 60px 20px 40px;
    }

    .header-badge {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 6px;
      color: var(--neon-green);
      border: 1px solid var(--neon-green);
      padding: 4px 16px;
      margin-bottom: 20px;
      animation: pulse-border 2s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 6px var(--neon-green), inset 0 0 6px rgba(0,255,136,0.1); }
      50% { box-shadow: 0 0 20px var(--neon-green), inset 0 0 12px rgba(0,255,136,0.2); }
    }

    h1 {
      font-family: 'Black Ops One', cursive;
      font-size: clamp(52px, 10vw, 110px);
      line-height: 0.9;
      letter-spacing: -2px;
      background: linear-gradient(135deg, var(--neon-green) 0%, var(--neon-blue) 50%, var(--neon-pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(0,255,136,0.4));
      animation: title-flicker 8s ease-in-out infinite;
    }

    @keyframes title-flicker {
      0%, 90%, 100% { opacity: 1; }
      92% { opacity: 0.8; }
      94% { opacity: 1; }
      96% { opacity: 0.7; }
      98% { opacity: 1; }
    }

    .subtitle {
      margin-top: 16px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      letter-spacing: 4px;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 30px;
      padding: 16px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      text-align: center;
    }
    .stat-value {
      font-family: 'Black Ops One', cursive;
      font-size: 28px;
      color: var(--neon-green);
      text-shadow: 0 0 20px var(--neon-green);
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
    }

    /* Search */
    .search-wrap {
      position: relative;
      z-index: 10;
      max-width: 500px;
      margin: 40px auto 0;
      padding: 0 20px;
    }
    .search-wrap input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--neon-green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      padding: 14px 20px 14px 44px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .search-wrap input:focus {
      border-color: var(--neon-green);
      box-shadow: 0 0 20px rgba(0,255,136,0.2);
    }
    .search-wrap input::placeholder { color: rgba(0,255,136,0.3); }
    .search-icon {
      position: absolute;
      left: 36px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--neon-green);
      opacity: 0.5;
      font-size: 18px;
    }

    /* Game grid */
    .grid {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 50px auto;
      padding: 0 20px;
    }

    .game-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s, border-color 0.3s;
      animation: card-in 0.6s ease both;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .game-card:hover {
      transform: translateY(-6px);
      border-color: var(--neon-green);
      box-shadow: 0 0 40px rgba(0,255,136,0.15), 0 20px 40px rgba(0,0,0,0.5);
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }
    .game-card:hover::before { transform: scaleX(1); }

    .card-thumb {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #0a0a1a, #0f0f2a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      position: relative;
      overflow: hidden;
    }

    .card-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    }

    .card-body {
      padding: 20px;
    }

    .card-tag {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--neon-pink);
      margin-bottom: 8px;
    }

    .card-title {
      font-family: 'Black Ops One', cursive;
      font-size: 22px;
      color: #fff;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    .card-plays {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }

    .play-btn {
      background: transparent;
      border: 1px solid var(--neon-green);
      color: var(--neon-green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      padding: 8px 18px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .play-btn:hover {
      background: var(--neon-green);
      color: #000;
      box-shadow: 0 0 20px rgba(0,255,136,0.5);
    }

    /* Difficulty badge */
    .difficulty {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 3px 8px;
      margin-bottom: 10px;
    }
    .diff-easy { border: 1px solid var(--neon-green); color: var(--neon-green); }
    .diff-medium { border: 1px solid var(--neon-yellow); color: var(--neon-yellow); }
    .diff-hard { border: 1px solid var(--neon-pink); color: var(--neon-pink); }

    /* No results */
    #no-results {
      display: none;
      text-align: center;
      color: rgba(255,255,255,0.3);
      grid-column: 1/-1;
      padding: 60px;
      font-size: 14px;
      letter-spacing: 3px;
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 20px;
      border-top: 1px solid var(--border);
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      letter-spacing: 3px;
    }
    footer span { color: var(--neon-green); }

    /* Glitch on logo hover */
    h1:hover {
      animation: glitch 0.3s steps(2) forwards;
    }
    @keyframes glitch {
      0%   { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
      25%  { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-blue); transform: skewX(-3deg); }
      50%  { text-shadow: 2px 0 var(--neon-green), -2px 0 var(--neon-pink); }
      75%  { text-shadow: -2px 0 var(--neon-blue), 2px 0 var(--neon-green); transform: skewX(3deg); }
      100% { text-shadow: none; transform: none; }
    }

    /* Stagger animations */
    .game-card:nth-child(1) { animation-delay: 0.0s; }
    .game-card:nth-child(2) { animation-delay: 0.1s; }
    .game-card:nth-child(3) { animation-delay: 0.2s; }
    .game-card:nth-child(4) { animation-delay: 0.3s; }
    .game-card:nth-child(5) { animation-delay: 0.4s; }
    .game-card:nth-child(6) { animation-delay: 0.5s; }
  </style>
</head>
<body>

<header>
  <div class="header-badge">FREE TO PLAY · BROWSER BASED · NO INSTALL</div>
  <h1>ARCADE<br>HUB</h1>
  <p class="subtitle">PYGAME GAMES · RUNNING IN YOUR BROWSER</p>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-value" id="game-count">0</div>
      <div class="stat-label">GAMES</div>
    </div>
    <div class="stat">
      <div class="stat-value">FREE</div>
      <div class="stat-label">ALWAYS</div>
    </div>
    <div class="stat">
      <div class="stat-value">∞</div>
      <div class="stat-label">PLAYERS</div>
    </div>
  </div>
</header>

<div class="search-wrap">
  <span class="search-icon">⌕</span>
  <input type="text" id="search" placeholder="SEARCH GAMES..." oninput="filterGames()" />
</div>

<div class="grid" id="grid">
  <div id="no-results">NO GAMES FOUND</div>
</div>

<footer>
  BUILT WITH <span>PYGBAG</span> · HOSTED ON <span>GITHUB PAGES</span> · MADE WITH ❤️
</footer>

<script>
  // ============================================================
  // EDIT THIS ARRAY TO ADD YOUR GAMES
  // Each game needs its folder in /games/game-folder-name/
  // ============================================================
  const GAMES = [
    {
      id: "game1",
      title: "YOUR GAME 1",
      description: "Replace this with your game description. What's the goal? How do you play?",
      emoji: "🎮",
      tag: "ACTION",
      difficulty: "medium",
      folder: "game1",   // folder inside /games/
      plays: "0"
    },
    {
      id: "game2",
      title: "YOUR GAME 2",
      description: "Add your second game here. This card links directly to its web build.",
      emoji: "🧩",
      tag: "PUZZLE",
      difficulty: "easy",
      folder: "game2",
      plays: "0"
    },
    {
      id: "game3",
      title: "YOUR GAME 3",
      description: "A third game slot. Duplicate the object above to add as many as you want.",
      emoji: "🚀",
      tag: "SHOOTER",
      difficulty: "hard",
      folder: "game3",
      plays: "0"
    },
  ];

  function renderCards(games) {
    const grid = document.getElementById('grid');
    const noResults = document.getElementById('no-results');
    const existing = grid.querySelectorAll('.game-card');
    existing.forEach(c => c.remove());

    if (games.length === 0) {
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';

    games.forEach(game => {
      const diffClass = `diff-${game.difficulty}`;
      const card = document.createElement('a');
      card.className = 'game-card';
      card.href = `games/${game.folder}/index.html`;
      card.innerHTML = `
        <div class="card-thumb">${game.emoji}</div>
        <div class="card-body">
          <div class="card-tag">${game.tag}</div>
          <div class="difficulty ${diffClass}">${game.difficulty.toUpperCase()}</div>
          <div class="card-title">${game.title}</div>
          <div class="card-desc">${game.description}</div>
          <div class="card-footer">
            <span class="card-plays">▶ ${game.plays} plays</span>
            <span class="play-btn">PLAY NOW</span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function filterGames() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = GAMES.filter(g =>
      g.title.toLowerCase().includes(q) ||
      g.description.toLowerCase().includes(q) ||
      g.tag.toLowerCase().includes(q)
    );
    renderCards(filtered);
  }

  // Init
  document.getElementById('game-count').textContent = GAMES.length;
  renderCards(GAMES);
</script>
</body>
</html>
